# User notebook environment for the course.
name: tsa-course
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - numpy=2.4.3
  - matplotlib=3.10.8
  - scipy=1.17.1
  - tqdm=4.67.3
  - statsmodels=0.14.6
  - pandas=3.0.1
  - pandas-datareader=0.10.0
  - seaborn=0.13.2
  - scikit-learn=1.8.0
  - setuptools=80.10.2
  - notebook=6.5.7
  - rise=5.7.1
  - dtaidistance=2.4.0
  - plotly=6.6.0
  - ipywidgets=8.1.8
  - pip:
      - opencv-python-headless==4.13.0.92
      - pmdarima==2.1.1
      - prophet==1.3.0
      - reservoir-computing==1.0.2
      - tck==1.0.0
      - yfinance==1.2.0
      - -e .
